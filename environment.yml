name: geoecology
channels:
  - conda-forge

dependencies:
  - python=3.11

  # Core notebook environment
  - jupyterlab
  - ipywidgets
  - ipympl

  # Scientific stack
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - statsmodels

  # Plotting (IMPORTANT: pinned for stability)
  - matplotlib=3.8.*
  - seaborn

  # Geospatial core stack (kept compatible as a unit)
  - geopandas
  - shapely
  - pyproj
  - fiona
  - rasterio
  - rasterstats

  # Mapping
  - folium

  # File I/O
  - openpyxl
  - xlrd